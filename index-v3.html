<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternTrack Pro - Advanced Project Management with GitHub Integration</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    <style>
        :root {
            --bg: #0d0f12;
            --bg2: #141720;
            --bg3: #1a1e28;
            --surface: #1f2433;
            --surface2: #252b3b;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #e8eaf0;
            --text2: #8b92a5;
            --text3: #555e72;
            --accent: #2de8b0;
            --accent2: #1bba8a;
            --accent-bg: rgba(45,232,176,0.12);
            --blue: #4a9eff;
            --blue-bg: rgba(74,158,255,0.1);
            --amber: #f5a623;
            --red: #ff5757;
            --red-bg: rgba(255,87,87,0.1);
            --r: 10px;
            --r-sm: 6px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Sora', system-ui; background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        /* ═══════════════════════════════════════════════════════════
           AUTH SCREENS
        ═══════════════════════════════════════════════════════════ */
        .auth-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .auth-bg {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(45,232,176,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .auth-container {
            position: relative;
            z-index: 10;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 40px;
            width: 90%;
            max-width: 450px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .auth-header {
            text-align: center;
            margin-bottom: 32px;
        }

        .logo-large {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }

        .logo-icon {
            width: 44px;
            height: 44px;
            background: var(--accent-bg);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 24px;
            border: 1px solid rgba(45,232,176,0.2);
        }

        .auth-tagline {
            font-size: 13px;
            color: var(--text2);
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 24px;
            border-bottom: 1px solid var(--border);
            padding-bottom: 12px;
        }

        .tab {
            flex: 1;
            padding: 8px 12px;
            text-align: center;
            cursor: pointer;
            border-bottom: 2px solid transparent;
            color: var(--text2);
            transition: all 0.2s;
            font-size: 13px;
            font-weight: 500;
            background: none;
            border: none;
            font-family: inherit;
        }

        .tab.active {
            color: var(--accent);
            border-bottom-color: var(--accent);
        }

        .form-section { display: none; }
        .form-section.active { display: block; }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, select {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus, select:focus {
            border-color: rgba(45,232,176,0.4);
        }

        .btn {
            width: 100%;
            padding: 11px;
            border-radius: var(--r-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-bottom: 10px;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-primary:hover {
            background: var(--accent2);
        }

        .btn-github {
            background: var(--text);
            color: var(--bg);
        }

        .btn-github:hover {
            background: #fff;
        }

        .btn-secondary {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .btn-secondary:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .auth-divider {
            text-align: center;
            margin: 16px 0;
            font-size: 12px;
            color: var(--text3);
            position: relative;
        }

        .auth-divider::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 0;
            right: 0;
            height: 1px;
            background: var(--border);
            z-index: 1;
        }

        .auth-divider span {
            position: relative;
            z-index: 2;
            background: var(--surface);
            padding: 0 10px;
        }

        .error-message {
            padding: 10px 12px;
            background: var(--red-bg);
            border: 1px solid rgba(255,87,87,0.2);
            border-radius: var(--r-sm);
            color: var(--red);
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }

        .success-message {
            padding: 10px 12px;
            background: var(--accent-bg);
            border: 1px solid rgba(45,232,176,0.2);
            border-radius: var(--r-sm);
            color: var(--accent);
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }

        .github-connect {
            text-align: center;
            padding: 20px;
            background: var(--bg3);
            border-radius: var(--r);
            margin-bottom: 16px;
        }

        .github-connect p {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 12px;
        }

        /* ═══════════════════════════════════════════════════════════
           APP LAYOUT
        ═══════════════════════════════════════════════════════════ */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .hdr {
            height: 62px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            flex-shrink: 0;
            z-index: 50;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .hdr-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 13px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-bg);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .github-status {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            background: var(--accent);
            display: inline-block;
            margin-left: 4px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text2);
            font-size: 17px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .icon-btn:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 12px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--r-sm);
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            transition: all 0.15s;
            margin: 0 6px 2px;
            user-select: none;
            border: none;
            background: none;
            font-family: inherit;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--bg3);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent);
            font-weight: 600;
        }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .page-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.4px;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 13px;
            color: var(--text2);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 18px 20px;
            margin-bottom: 16px;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 18px 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .project-card:hover {
            border-color: var(--border2);
            background: var(--surface2);
            transform: translateY(-2px);
        }

        .project-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .project-guide {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 12px;
        }

        .project-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px;
            background: var(--bg3);
            border-radius: var(--r-sm);
            margin-bottom: 12px;
            font-size: 12px;
        }

        .stat-value {
            font-size: 16px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text3);
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 12px;
            background: var(--accent-bg);
            color: var(--accent);
        }

        .button-group {
            display: flex;
            gap: 8px;
            margin-top: 12px;
        }

        .button-group .btn {
            flex: 1;
            margin-bottom: 0;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 20px;
            width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .modal-hdr {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text2);
            font-size: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .modal-close:hover {
            background: var(--red-bg);
            color: var(--red);
        }

        .modal-body {
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
        }

        .table-hdr {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            padding: 11px 16px;
            background: var(--bg3);
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
        }

        .table-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            font-size: 13px;
            transition: background 0.15s;
        }

        .table-row:hover {
            background: var(--bg3);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 11px 16px;
            border-radius: var(--r-sm);
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.25s;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            border-color: rgba(45,232,176,0.3);
            color: var(--accent);
        }

        .toast.error {
            border-color: rgba(255,87,87,0.3);
            color: var(--red);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .modal { width: 90%; }
            .projects-grid { grid-template-columns: 1fr; }
            .auth-container { width: 95%; max-width: 400px; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
     AUTH SCREENS
════════════════════════════════════════════════════════════════════ -->
<div id="authScreen" class="auth-screen">
    <div class="auth-bg"></div>
    <div class="auth-container">
        <div class="auth-header">
            <div class="logo-large">
                <span class="logo-icon"><i class="ti ti-building-community"></i></span>
                <div>
                    <div>Intern<span style="color:var(--accent)">Track</span></div>
                    <div style="font-size: 11px; color: var(--text2); font-weight: 400;">RVU Cybersecurity</div>
                </div>
            </div>
            <p class="auth-tagline">Advanced Project Management System</p>
        </div>

        <div class="tabs">
            <button class="tab active" onclick="switchAuthTab('login')">Sign In</button>
            <button class="tab" onclick="switchAuthTab('register')">Register</button>
        </div>

        <!-- Login Form -->
        <div id="loginSection" class="form-section active">
            <div id="loginError" class="error-message"></div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="loginEmail" class="form-input" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="loginPassword" class="form-input" placeholder="••••••••">
            </div>
            <button class="btn btn-primary" onclick="handleLogin()">
                <i class="ti ti-login"></i> Sign In
            </button>

            <div class="auth-divider"><span>or</span></div>

            <button class="btn btn-github" onclick="initiateGitHubLogin()">
                <i class="ti ti-brand-github"></i> Sign in with GitHub
            </button>
        </div>

        <!-- Register Form -->
        <div id="registerSection" class="form-section">
            <div id="registerError" class="error-message"></div>
            <div id="registerSuccess" class="success-message"></div>
            
            <div class="form-group">
                <label class="form-label">Full Name</label>
                <input type="text" id="registerName" class="form-input" placeholder="Your name">
            </div>
            <div class="form-group">
                <label class="form-label">Email</label>
                <input type="email" id="registerEmail" class="form-input" placeholder="your@email.com">
            </div>
            <div class="form-group">
                <label class="form-label">Password</label>
                <input type="password" id="registerPassword" class="form-input" placeholder="••••••••">
            </div>
            <div class="form-group">
                <label class="form-label">Role</label>
                <select id="registerRole" class="form-input">
                    <option value="">Select role</option>
                    <option value="student">Student</option>
                    <option value="mentor">Faculty/Mentor</option>
                    <option value="admin">Admin</option>
                </select>
            </div>

            <button class="btn btn-primary" onclick="handleRegister()">
                <i class="ti ti-user-plus"></i> Create Account
            </button>

            <div class="auth-divider"><span>Next</span></div>

            <div class="github-connect">
                <p><strong>Connect GitHub Account</strong></p>
                <p style="margin-bottom: 0;">After registration, authorize your GitHub profile to enable submissions.</p>
            </div>

            <button class="btn btn-github" onclick="initiateGitHubOAuth()">
                <i class="ti ti-brand-github"></i> Authorize with GitHub
            </button>
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     APP
════════════════════════════════════════════════════════════════════ -->
<div id="app" class="app" style="display: none;">
    <header class="hdr">
        <div class="logo">
            <i class="ti ti-building-community"></i>
            Intern<span style="color:var(--accent)">Track</span>
        </div>
        <div style="font-size: 11px; color: var(--text2);">RVU Cybersecurity</div>
        <div class="hdr-right">
            <button class="icon-btn" onclick="openModal('githubModal')" title="GitHub Status">
                <i class="ti ti-brand-github"></i>
            </button>
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div style="display: flex; flex-direction: column; gap: 2px;">
                    <div style="font-size: 13px; font-weight: 600;" id="userName">User</div>
                    <span style="font-size: 10px; color: var(--text3);" id="userRole">Role</span>
                </div>
                <span class="github-status" id="githubStatus" style="display: none;"></span>
            </div>
            <button class="icon-btn" onclick="logout()" title="Logout">
                <i class="ti ti-logout"></i>
            </button>
        </div>
    </header>

    <div class="layout">
        <nav class="sidebar" id="sidebar"></nav>
        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<!-- Modal Overlay -->
<div id="modalOverlay" class="modal-overlay">
    <!-- GitHub Modal -->
    <div id="githubModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            GitHub Account
            <button class="modal-close" onclick="closeModal('githubModal')"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
            <div id="githubContent"></div>
        </div>
    </div>

    <!-- Add Project Modal -->
    <div id="addProjectModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            Add New Project
            <button class="modal-close" onclick="closeModal('addProjectModal')"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Project Name *</label>
                <input type="text" id="projName" class="form-input" placeholder="Project name">
            </div>
            <div class="form-group">
                <label class="form-label">Faculty Guide *</label>
                <select id="projGuide" class="form-input"></select>
            </div>
            <div class="form-group">
                <label class="form-label">GitHub Repository *</label>
                <input type="text" id="projRepo" class="form-input" placeholder="repo-name">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="projDesc" class="form-input" rows="3" placeholder="Project description..."></textarea>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary btn-sm" onclick="closeModal('addProjectModal')">Cancel</button>
            <button class="btn btn-primary btn-sm" onclick="saveNewProject()">Create Project</button>
        </div>
    </div>

    <!-- Reassign Students Modal -->
    <div id="reassignModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            Reassign Students
            <button class="modal-close" onclick="closeModal('reassignModal')"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Project</label>
                <select id="reassignProject" class="form-input" onchange="loadProjectStudents()"></select>
            </div>
            <div class="form-group">
                <label class="form-label">Students</label>
                <div id="studentCheckboxes" style="max-height: 300px; overflow-y: auto; background: var(--bg3); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 8px;"></div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary btn-sm" onclick="closeModal('reassignModal')">Cancel</button>
            <button class="btn btn-primary btn-sm" onclick="saveReassignment()">Update Assignment</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ═══════════════════════════════════════════════════════════════════
    // STATE & DATA
    // ═══════════════════════════════════════════════════════════════════

    const REAL_PROJECTS = [
        { id: 1, name: '802.1X Port-Based Authentication with RADIUS on Wired & Wireless', guide: 'Dr. Manish Kumar', students: 3, repo: 'rvu-proj-802-1x' },
        { id: 2, name: 'Q-Learning Based Intrusion-Resilient Routing Protocol for IoT', guide: 'Sunilkumar J', students: 3, repo: 'rvu-proj-iot-routing' },
        { id: 3, name: 'AI-Based Cyber Crime Prediction System', guide: 'Evlin Vidyu Latha P', students: 20, repo: 'rvu-proj-crime-pred' },
        { id: 4, name: 'AI-Based Network Traffic Anomaly Detection', guide: 'Dr.Sarasvathi V', students: 17, repo: 'rvu-proj-anomaly' },
        { id: 5, name: 'AI-Driven Adaptive Intrusion Detection Framework', guide: 'Dr. Manish Kumar', students: 7, repo: 'rvu-proj-ids' }
    ];

    const REAL_FACULTY = [
        { id: 1, name: 'Dr. Manish Kumar', email: 'manish@rvu.edu', github: 'manish-rvu' },
        { id: 2, name: 'Sunilkumar J', email: 'sunil@rvu.edu', github: 'sunil-rvu' },
        { id: 3, name: 'Evlin Vidyu Latha P', email: 'evlin@rvu.edu', github: 'evlin-rvu' },
        { id: 4, name: 'Dr.Sarasvathi V', email: 'sara@rvu.edu', github: 'sara-rvu' }
    ];

    const DEMO_USERS = {
        'admin@rvu.edu': { name: 'Admin User', password: 'admin123', role: 'admin', github: null },
        'mentor@rvu.edu': { name: 'Dr. Manish Kumar', password: 'pass123', role: 'mentor', github: 'manish-rvu', projects: [1, 2, 3] },
        'student@rvu.edu': { name: 'Student User', password: 'pass123', role: 'student', github: null, projects: [1] }
    };

    let currentUser = null;
    let projects = JSON.parse(JSON.stringify(REAL_PROJECTS));
    let faculty = JSON.parse(JSON.stringify(REAL_FACULTY));
    let users = {};
    let projectStudents = {};
    let githubAuthorized = false;

    // ═══════════════════════════════════════════════════════════════════
    // AUTH FUNCTIONS
    // ═══════════════════════════════════════════════════════════════════

    function switchAuthTab(tab) {
        document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
        
        event.target.classList.add('active');
        document.getElementById(tab + 'Section').classList.add('active');
    }

    function handleLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        const password = document.getElementById('loginPassword').value;

        if (!email || !password) {
            showAuthError('loginError', 'Please fill all fields');
            return;
        }

        // Check demo users first
        if (DEMO_USERS[email] && DEMO_USERS[email].password === password) {
            const user = { email, ...DEMO_USERS[email] };
            loginUser(user);
            return;
        }

        // Check registered users
        if (users[email] && users[email].password === password) {
            const user = { email, ...users[email] };
            loginUser(user);
            return;
        }

        showAuthError('loginError', 'Invalid email or password');
    }

    function handleRegister() {
        const name = document.getElementById('registerName').value.trim();
        const email = document.getElementById('registerEmail').value.trim();
        const password = document.getElementById('registerPassword').value;
        const role = document.getElementById('registerRole').value;

        if (!name || !email || !password || !role) {
            showAuthError('registerError', 'Please fill all fields');
            return;
        }

        if (users[email] || DEMO_USERS[email]) {
            showAuthError('registerError', 'Email already registered');
            return;
        }

        // Register user
        users[email] = { name, password, role, github: null, projects: [] };
        localStorage.setItem('users', JSON.stringify(users));

        document.getElementById('registerSuccess').textContent = '✓ Registration successful! Now authorize your GitHub account.';
        document.getElementById('registerSuccess').style.display = 'block';

        setTimeout(() => {
            initiateGitHubOAuth();
        }, 2000);
    }

    function initiateGitHubLogin() {
        const email = document.getElementById('loginEmail').value.trim();
        if (!email) {
            showAuthError('loginError', 'Enter email first');
            return;
        }
        initiateGitHubOAuth(email);
    }

    function initiateGitHubOAuth(email = null) {
        // Simulate GitHub OAuth flow
        const githubUsername = prompt('Enter your GitHub username:');
        if (!githubUsername) return;

        if (email) {
            // Login with GitHub
            if (users[email]) {
                users[email].github = githubUsername;
                loginUser({ email, ...users[email] });
            }
        } else {
            // Register and connect GitHub
            const email = document.getElementById('registerEmail').value.trim();
            if (users[email]) {
                users[email].github = githubUsername;
                localStorage.setItem('users', JSON.stringify(users));
                showToast(`GitHub account connected: ${githubUsername}`, 'success');
            }
        }
    }

    function loginUser(user) {
        currentUser = user;
        sessionStorage.setItem('currentUser', JSON.stringify(user));
        
        // Check GitHub status
        githubAuthorized = !!user.github;
        
        launchApp();
    }

    function logout() {
        if (confirm('Logout?')) {
            currentUser = null;
            sessionStorage.removeItem('currentUser');
            location.reload();
        }
    }

    function showAuthError(id, msg) {
        const el = document.getElementById(id);
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    // ═══════════════════════════════════════════════════════════════════
    // APP
    // ═══════════════════════════════════════════════════════════════════

    function launchApp() {
        document.getElementById('authScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';

        // Load data
        loadStorage();

        // Setup UI
        setupUI();
        buildNavigation();
        showDashboard();
    }

    function setupUI() {
        const avatar = currentUser.name.charAt(0).toUpperCase();
        document.getElementById('userAvatar').textContent = avatar;
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userRole').textContent = currentUser.role.toUpperCase();
        
        if (githubAuthorized) {
            document.getElementById('githubStatus').style.display = 'inline-block';
        }

        // Populate faculty select
        const selects = document.querySelectorAll('#projGuide');
        selects.forEach(sel => {
            sel.innerHTML = faculty.map(f => `<option value="${f.name}">${f.name}</option>`).join('');
        });
    }

    function buildNavigation() {
        const nav = document.getElementById('sidebar');
        const items = [];

        items.push({ icon: 'ti-layout-dashboard', text: 'Dashboard', fn: 'showDashboard' });
        items.push({ icon: 'ti-folder', text: 'Projects', fn: 'showProjects' });
        
        if (currentUser.role === 'admin') {
            items.push({ icon: 'ti-user-plus', text: 'Add Project', fn: 'openAddProjectModal' });
            items.push({ icon: 'ti-users', text: 'Reassign Students', fn: 'openReassignModal' });
        }

        nav.innerHTML = items.map(item => `
            <button class="nav-item" onclick="${item.fn}()">
                <i class="ti ${item.icon}"></i>
                <span>${item.text}</span>
            </button>
        `).join('');
    }

    function showDashboard() {
        updateNav('showDashboard');
        const accessibleProjects = getAccessibleProjects();

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Dashboard</h1>
                    <p class="page-sub">Welcome, ${currentUser.name}</p>
                </div>
            </div>

            <div class="projects-grid">
                <div class="card">
                    <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Accessible Projects</div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 4px;">${accessibleProjects.length}</div>
                    <div style="font-size: 12px; color: var(--text2);">Based on your role</div>
                </div>
                <div class="card">
                    <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">GitHub Status</div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--blue); margin-bottom: 4px;">${githubAuthorized ? '✓ Connected' : '✗ Not Connected'}</div>
                    <div style="font-size: 12px; color: var(--text2);">RVU Cybersecurity</div>
                </div>
                <div class="card">
                    <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px;">Total Students</div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--amber); margin-bottom: 4px;">${Object.values(projectStudents).reduce((sum, arr) => sum + arr.length, 0)}</div>
                    <div style="font-size: 12px; color: var(--text2);">Across all projects</div>
                </div>
            </div>

            <div class="card">
                <div style="font-size: 13px; font-weight: 600; margin-bottom: 14px;">Your Projects</div>
                ${accessibleProjects.length > 0 
                    ? accessibleProjects.map(p => `
                        <div style="padding: 10px 0; border-bottom: 1px solid var(--border);">
                            <div style="font-weight: 500; margin-bottom: 3px;">${p.name.slice(0,60)}...</div>
                            <div style="font-size: 12px; color: var(--text2);">Guide: ${p.guide} | Students: ${projectStudents[p.id]?.length || 0}</div>
                        </div>
                    `).join('')
                    : '<div style="color: var(--text3); padding: 10px;">No accessible projects</div>'}
            </div>
        `;

        updateMainContent(html);
    }

    function showProjects() {
        updateNav('showProjects');
        const accessibleProjects = getAccessibleProjects();

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Projects</h1>
                    <p class="page-sub">${accessibleProjects.length} projects</p>
                </div>
                ${currentUser.role === 'admin' ? `<button class="btn btn-primary" onclick="openModal('addProjectModal')" style="width: auto;"><i class="ti ti-plus"></i> Add Project</button>` : ''}
            </div>

            <div class="projects-grid">
                ${accessibleProjects.map(p => `
                    <div class="project-card">
                        <div class="project-name">${p.name}</div>
                        <div class="project-guide">Guide: <strong>${p.guide}</strong></div>
                        <div class="project-stats">
                            <div>
                                <div class="stat-value">${projectStudents[p.id]?.length || 0}</div>
                                <div class="stat-label">Students</div>
                            </div>
                            <div>
                                <div class="stat-value">${p.students}</div>
                                <div class="stat-label">Max</div>
                            </div>
                        </div>
                        <div style="font-size: 12px; color: var(--text2); margin-bottom: 12px;">
                            <strong>GitHub:</strong> rvu-cybersec/${p.repo}
                        </div>
                        <span class="badge">Active</span>
                        <div class="button-group">
                            <button class="btn btn-secondary btn-sm" onclick="viewProject(${p.id})">View</button>
                            ${currentUser.role === 'admin' ? `<button class="btn btn-secondary btn-sm" onclick="editProject(${p.id})">Edit</button>` : ''}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;

        updateMainContent(html);
    }

    // ═══════════════════════════════════════════════════════════════════
    // UTILITY FUNCTIONS
    // ═══════════════════════════════════════════════════════════════════

    function getAccessibleProjects() {
        if (currentUser.role === 'admin') return projects;
        return projects.filter(p => currentUser.projects?.includes(p.id));
    }

    function updateNav(fn) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`[onclick="${fn}()"]`)?.classList.add('active');
    }

    function updateMainContent(html) {
        document.getElementById('mainContent').innerHTML = `<div class="page active">${html}</div>`;
    }

    function openModal(id) {
        document.getElementById('modalOverlay').classList.add('open');
        document.getElementById(id).style.display = 'block';

        if (id === 'reassignModal') {
            document.getElementById('reassignProject').innerHTML = projects.map(p => 
                `<option value="${p.id}">${p.name}</option>`
            ).join('');
        }
    }

    function closeModal(id) {
        document.getElementById('modalOverlay').classList.remove('open');
        document.getElementById(id).style.display = 'none';
    }

    function openAddProjectModal() {
        if (currentUser.role !== 'admin') {
            showToast('Admin access required', 'error');
            return;
        }
        openModal('addProjectModal');
    }

    function saveNewProject() {
        const name = document.getElementById('projName').value.trim();
        const guide = document.getElementById('projGuide').value;
        const repo = document.getElementById('projRepo').value.trim();
        const desc = document.getElementById('projDesc').value.trim();

        if (!name || !guide || !repo) {
            showToast('Fill all required fields', 'error');
            return;
        }

        const newProject = {
            id: Math.max(...projects.map(p => p.id)) + 1,
            name,
            guide,
            students: 0,
            repo,
            description: desc
        };

        projects.push(newProject);
        projectStudents[newProject.id] = [];
        saveStorage();

        showToast('Project created successfully', 'success');
        closeModal('addProjectModal');
        showProjects();
    }

    function openReassignModal() {
        if (currentUser.role !== 'admin') {
            showToast('Admin access required', 'error');
            return;
        }
        openModal('reassignModal');
    }

    function loadProjectStudents() {
        const projId = parseInt(document.getElementById('reassignProject').value);
        const students = projectStudents[projId] || [];

        const checkboxes = [
            { id: 1, name: 'Mukhil Kumaran S', email: 'mukhil@college.edu' },
            { id: 2, name: 'Samip Singh', email: 'samip@college.edu' },
            { id: 3, name: 'KISHAN GUPTA', email: 'kishan@college.edu' },
            { id: 4, name: 'Student 4', email: 'student4@college.edu' },
            { id: 5, name: 'Student 5', email: 'student5@college.edu' }
        ];

        document.getElementById('studentCheckboxes').innerHTML = checkboxes.map(s => `
            <label style="display: flex; align-items: center; gap: 8px; padding: 8px; cursor: pointer;">
                <input type="checkbox" value="${s.id}" ${students.includes(s.id) ? 'checked' : ''}>
                ${s.name}
            </label>
        `).join('');
    }

    function saveReassignment() {
        const projId = parseInt(document.getElementById('reassignProject').value);
        const selected = Array.from(document.querySelectorAll('#studentCheckboxes input:checked'))
            .map(cb => parseInt(cb.value));

        projectStudents[projId] = selected;
        saveStorage();

        showToast('Students reassigned successfully', 'success');
        closeModal('reassignModal');
        showProjects();
    }

    function viewProject(id) {
        const project = projects.find(p => p.id === id);
        alert(`Project: ${project.name}\nGuide: ${project.guide}\nRepo: rvu-cybersec/${project.repo}\n\nGitHub Submissions:\nAll student work is submitted via the RVU Cybersecurity GitHub organization.`);
    }

    function editProject(id) {
        alert('Edit project ' + id);
    }

    function saveStorage() {
        localStorage.setItem('projects', JSON.stringify(projects));
        localStorage.setItem('projectStudents', JSON.stringify(projectStudents));
        localStorage.setItem('users', JSON.stringify(users));
    }

    function loadStorage() {
        const stored = localStorage.getItem('projects');
        if (stored) projects = JSON.parse(stored);

        const storedStudents = localStorage.getItem('projectStudents');
        if (storedStudents) projectStudents = JSON.parse(storedStudents);

        const storedUsers = localStorage.getItem('users');
        if (storedUsers) users = JSON.parse(storedUsers);

        // Initialize if empty
        if (Object.keys(projectStudents).length === 0) {
            projects.forEach(p => {
                projectStudents[p.id] = [];
            });
        }
    }

    function showToast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type}`;
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ═══════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════════

    window.addEventListener('load', () => {
        loadStorage();
        
        const stored = sessionStorage.getItem('currentUser');
        if (stored) {
            currentUser = JSON.parse(stored);
            githubAuthorized = !!currentUser.github;
            launchApp();
        }

        document.getElementById('modalOverlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modalOverlay')) {
                document.querySelectorAll('.modal').forEach(m => m.style.display = 'none');
                document.getElementById('modalOverlay').classList.remove('open');
            }
        });
    });
</script>

</body>
</html>

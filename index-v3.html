<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternTrack Pro - Project Management System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    <style>
        :root {
            --bg: #0d0f12;
            --bg2: #141720;
            --bg3: #1a1e28;
            --surface: #1f2433;
            --surface2: #252b3b;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #e8eaf0;
            --text2: #8b92a5;
            --text3: #555e72;
            --accent: #2de8b0;
            --accent2: #1bba8a;
            --accent-bg: rgba(45,232,176,0.12);
            --blue: #4a9eff;
            --blue-bg: rgba(74,158,255,0.1);
            --amber: #f5a623;
            --amber-bg: rgba(245,166,35,0.1);
            --red: #ff5757;
            --red-bg: rgba(255,87,87,0.1);
            --purple: #a78bfa;
            --r: 10px;
            --r-sm: 6px;
        }

        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            height: 100%;
            font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            font-size: 14px;
            -webkit-font-smoothing: antialiased;
        }

        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        /* ═══════════════════════════════════════════════════════════
           LOGIN SCREEN
        ═══════════════════════════════════════════════════════════ */
        .login-screen {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .login-bg {
            position: absolute;
            inset: 0;
            background-image: radial-gradient(ellipse 80% 70% at 50% 50%, rgba(45,232,176,0.08) 0%, transparent 70%);
            pointer-events: none;
        }

        .login-container {
            position: relative;
            z-index: 10;
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 40px;
            width: 90%;
            max-width: 420px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .login-logo {
            display: flex;
            align-items: center;
            gap: 12px;
            margin-bottom: 8px;
        }

        .logo-icon {
            width: 40px;
            height: 40px;
            background: var(--accent-bg);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--accent);
            font-size: 20px;
            border: 1px solid rgba(45,232,176,0.2);
        }

        .logo-text {
            font-size: 22px;
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .accent { color: var(--accent); }

        .login-tagline {
            font-size: 13px;
            color: var(--text2);
            margin-bottom: 24px;
        }

        .login-divider {
            height: 1px;
            background: var(--border);
            margin-bottom: 20px;
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus {
            border-color: rgba(45,232,176,0.4);
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 11px 18px;
            border-radius: var(--r-sm);
            font-size: 13px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-primary:hover {
            background: var(--accent2);
            transform: translateY(-1px);
        }

        .btn-github {
            background: var(--text);
            color: var(--bg);
            width: 100%;
            margin-bottom: 12px;
        }

        .btn-github:hover {
            background: #fff;
        }

        .login-error {
            padding: 12px;
            background: var(--red-bg);
            border: 1px solid rgba(255,87,87,0.2);
            border-radius: var(--r-sm);
            color: var(--red);
            font-size: 12px;
            margin-bottom: 12px;
            display: none;
        }

        /* ═══════════════════════════════════════════════════════════
           APP LAYOUT
        ═══════════════════════════════════════════════════════════ */
        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .hdr {
            height: 62px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            flex-shrink: 0;
            z-index: 50;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }

        .hdr-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 13px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-bg);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .role-badge {
            font-size: 10px;
            font-weight: 600;
            background: var(--blue-bg);
            color: var(--blue);
            padding: 3px 8px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text2);
            font-size: 17px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .icon-btn:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 12px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--r-sm);
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            transition: all 0.15s;
            margin: 0 6px 2px;
            user-select: none;
            border: none;
            background: none;
            font-family: inherit;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--bg3);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent);
            font-weight: 600;
        }

        .nav-item i { font-size: 17px; flex-shrink: 0; }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
            animation: fadeIn 0.25s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .page-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.4px;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 13px;
            color: var(--text2);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 18px 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-title i {
            font-size: 16px;
            color: var(--accent);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 18px 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .project-card:hover {
            border-color: var(--border2);
            background: var(--surface2);
            transform: translateY(-2px);
        }

        .project-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 6px;
        }

        .project-info {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 12px;
            line-height: 1.5;
        }

        .project-stats {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            padding: 12px;
            background: var(--bg3);
            border-radius: var(--r-sm);
            margin-bottom: 14px;
            font-size: 12px;
        }

        .stat-item {
            text-align: center;
        }

        .stat-value {
            font-size: 18px;
            font-weight: 700;
            color: var(--accent);
        }

        .stat-label {
            color: var(--text3);
            font-size: 10px;
            margin-top: 3px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .project-actions {
            display: flex;
            gap: 8px;
        }

        .project-actions .btn {
            flex: 1;
            padding: 8px 12px;
            font-size: 12px;
            justify-content: center;
        }

        /* Detail View */
        .detail-container {
            display: none;
        }

        .detail-container.active {
            display: block;
        }

        .detail-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--border);
        }

        .detail-title {
            font-size: 24px;
            font-weight: 700;
            color: var(--text);
        }

        .detail-guide {
            font-size: 12px;
            color: var(--text2);
            margin-top: 4px;
        }

        .btn-secondary {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
            padding: 8px 14px;
        }

        .btn-secondary:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .detail-section {
            margin-bottom: 28px;
        }

        .section-title {
            font-size: 16px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .btn-add {
            background: var(--accent);
            color: var(--bg);
            border: none;
            padding: 8px 14px;
            border-radius: var(--r-sm);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-add:hover {
            background: var(--accent2);
        }

        .tags-list {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }

        .tag {
            background: var(--accent-bg);
            border: 1px solid rgba(45,232,176,0.2);
            color: var(--accent);
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .tag-remove {
            cursor: pointer;
            color: var(--red);
            font-weight: bold;
        }

        .tag-remove:hover {
            color: #ff7777;
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text3);
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r);
        }

        .task-item {
            background: var(--surface);
            border-left: 3px solid var(--accent);
            padding: 14px 16px;
            border-radius: var(--r-sm);
            margin-bottom: 10px;
            border: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: start;
        }

        .task-content {
            flex: 1;
        }

        .task-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 4px;
        }

        .task-dates {
            font-size: 11px;
            color: var(--text3);
            margin-bottom: 4px;
        }

        .task-desc {
            font-size: 12px;
            color: var(--text2);
            margin-top: 6px;
        }

        .submission-item {
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            padding: 12px;
            margin-bottom: 10px;
        }

        .submission-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 8px;
        }

        .submission-student {
            font-size: 13px;
            font-weight: 600;
            color: var(--text);
        }

        .submission-task {
            font-size: 11px;
            color: var(--text2);
            margin-top: 3px;
        }

        .submission-status {
            font-size: 10px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .status-pending {
            background: var(--amber-bg);
            color: var(--amber);
        }

        .status-reviewed {
            background: var(--accent-bg);
            color: var(--accent);
        }

        .submission-link {
            display: inline-block;
            margin-top: 8px;
            color: var(--blue);
            text-decoration: none;
            font-size: 12px;
            font-weight: 500;
        }

        .submission-link:hover {
            text-decoration: underline;
        }

        /* Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 20px;
            width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .modal-hdr {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text2);
            font-size: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .modal-close:hover {
            background: var(--red-bg);
            color: var(--red);
        }

        .modal-body {
            margin-bottom: 16px;
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
        }

        .checkbox-group label {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            cursor: pointer;
            border-radius: var(--r-sm);
            transition: background 0.2s;
        }

        .checkbox-group label:hover {
            background: var(--bg3);
        }

        .checkbox-group input[type="checkbox"] {
            accent-color: var(--accent);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 11px 16px;
            border-radius: var(--r-sm);
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.25s;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .btn-sm {
            padding: 5px 10px;
            font-size: 12px;
        }

        .btn-danger {
            background: var(--red-bg);
            color: var(--red);
            border: none;
        }

        .btn-danger:hover {
            background: var(--red);
            color: var(--bg);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .modal { width: 90%; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<!-- ═══════════════════════════════════════════════════════════════════
     LOGIN SCREEN
═══════════════════════════════════════════════════════════════════ -->
<div id="loginScreen" class="login-screen" style="display: flex;">
    <div class="login-bg"></div>
    <div class="login-container">
        <div class="login-logo">
            <span class="logo-icon"><i class="ti ti-building-community"></i></span>
            <span class="logo-text">Intern<span class="accent">Track</span> Pro</span>
        </div>
        <div class="login-tagline">Cybersecurity Internship Management Platform</div>
        <div class="login-divider"></div>
        
        <div id="loginError" class="login-error"></div>

        <div class="form-group">
            <label class="form-label">GitHub Username</label>
            <input type="text" id="loginUsername" class="form-input" placeholder="your-github-username">
        </div>

        <div class="form-group">
            <label class="form-label">Password</label>
            <input type="password" id="loginPassword" class="form-input" placeholder="Your password">
        </div>

        <div class="form-group">
            <label class="form-label">Role</label>
            <select id="loginRole" class="form-input">
                <option value="">Select your role</option>
                <option value="admin">Admin</option>
                <option value="mentor">Mentor/Faculty</option>
                <option value="student">Student</option>
            </select>
        </div>

        <button class="btn btn-primary" onclick="handleLogin()">
            <i class="ti ti-login"></i> Sign In
        </button>

        <button class="btn btn-github" onclick="handleGitHubOAuth()">
            <i class="ti ti-brand-github"></i> Sign in with GitHub
        </button>

        <div style="text-align: center; font-size: 11px; color: var(--text3); margin-top: 16px;">
            Demo: admin / admin123 (Admin)<br>
            mentor1 / pass123 (Mentor)<br>
            student1 / pass123 (Student)
        </div>
    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════════
     MAIN APP
═══════════════════════════════════════════════════════════════════ -->
<div id="app" class="app" style="display: none;">
    <header class="hdr">
        <div class="logo">
            <i class="ti ti-building-community"></i>
            Intern<span class="accent">Track</span>
        </div>
        <div class="hdr-right">
            <div class="user-info">
                <div class="user-avatar" id="userAvatar">A</div>
                <div style="display: flex; flex-direction: column; gap: 2px; min-width: 0;">
                    <div style="font-size: 13px; font-weight: 600;" id="userName">User</div>
                    <span class="role-badge" id="userRole">Admin</span>
                </div>
            </div>
            <button class="icon-btn" onclick="logout()" title="Logout">
                <i class="ti ti-logout"></i>
            </button>
        </div>
    </header>

    <div class="layout">
        <nav class="sidebar" id="sidebar"></nav>
        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<!-- Modal Overlay -->
<div id="modalOverlay" class="modal-overlay">
    <!-- Add Mentor Modal -->
    <div id="addMentorModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            Add Mentors to Project
            <button class="modal-close" onclick="closeModal('addMentorModal')"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body checkbox-group" id="mentorSelectList"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('addMentorModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveMentors(event)">Save Mentors</button>
        </div>
    </div>

    <!-- Add Student Modal -->
    <div id="addStudentModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            Add Students to Project
            <button class="modal-close" onclick="closeModal('addStudentModal')"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body checkbox-group" id="studentSelectList"></div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('addStudentModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveStudents(event)">Save Students</button>
        </div>
    </div>

    <!-- Add Task Modal -->
    <div id="addTaskModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            Create Task
            <button class="modal-close" onclick="closeModal('addTaskModal')"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Task Title *</label>
                <input type="text" id="taskTitle" class="form-input" placeholder="e.g., Design Phase">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="taskDescription" class="form-input" rows="3" placeholder="Task description..."></textarea>
            </div>
            <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px;">
                <div class="form-group">
                    <label class="form-label">Start Date *</label>
                    <input type="date" id="taskStartDate" class="form-input">
                </div>
                <div class="form-group">
                    <label class="form-label">End Date *</label>
                    <input type="date" id="taskEndDate" class="form-input">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label">Assign to Students</label>
                <div class="checkbox-group" id="taskStudentSelectList"></div>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('addTaskModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveTask(event)">Create Task</button>
        </div>
    </div>

    <!-- Add Submission Modal -->
    <div id="addSubmissionModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            Record Student Submission
            <button class="modal-close" onclick="closeModal('addSubmissionModal')"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Student Name *</label>
                <input type="text" id="submissionStudent" class="form-input" placeholder="Student name">
            </div>
            <div class="form-group">
                <label class="form-label">Task Title</label>
                <input type="text" id="submissionTask" class="form-input" placeholder="Associated task">
            </div>
            <div class="form-group">
                <label class="form-label">Submission Link *</label>
                <input type="text" id="submissionLink" class="form-input" placeholder="https://drive.google.com/... or GitHub link">
            </div>
            <div class="form-group">
                <label class="form-label">Notes</label>
                <textarea id="submissionNotes" class="form-input" rows="2" placeholder="Optional notes..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Status</label>
                <select id="submissionStatus" class="form-input">
                    <option value="Pending">Pending</option>
                    <option value="Reviewed">Reviewed</option>
                    <option value="Approved">Approved</option>
                </select>
            </div>
        </div>
        <div class="modal-actions">
            <button class="btn btn-secondary" onclick="closeModal('addSubmissionModal')">Cancel</button>
            <button class="btn btn-primary" onclick="saveSubmission(event)">Save Submission</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ═══════════════════════════════════════════════════════════════════
    // STATE & DATA
    // ═══════════════════════════════════════════════════════════════════

    const DEMO_USERS = {
        admin: { username: 'admin', password: 'admin123', role: 'admin', name: 'Administrator' },
        mentor1: { username: 'mentor1', password: 'pass123', role: 'mentor', name: 'Dr. Ramesh Kumar', projects: [1, 2, 3] },
        mentor2: { username: 'mentor2', password: 'pass123', role: 'mentor', name: 'Dr. Saliha Bathool', projects: [4, 5] },
        student1: { username: 'student1', password: 'pass123', role: 'student', name: 'Mukhil Kumaran S', projects: [1] },
        student2: { username: 'student2', password: 'pass123', role: 'student', name: 'Samip Singh', projects: [1] },
        student3: { username: 'student3', password: 'pass123', role: 'student', name: 'KISHAN GUPTA', projects: [2] }
    };

    const PROJECTS_DATA = [
        {
            id: 1,
            name: '802.1X Port-Based Authentication with RADIUS on Wired & Wireless',
            guide: 'Sheba Pari N',
            category: 'Network Security',
            students: 3,
            description: 'Implementing port-based authentication using RADIUS protocol'
        },
        {
            id: 2,
            name: 'Q-Learning Based Intrusion-Resilient Routing Protocol for IoT',
            guide: 'Dr. Ishita Chakraborty',
            category: 'IoT Security',
            students: 3,
            description: 'AI-based routing protocols for secure IoT communication'
        },
        {
            id: 3,
            name: 'Distributed Ledger Technology for Secure Data Management',
            guide: 'Dr. Saliha Bathool',
            category: 'Blockchain',
            students: 20,
            description: 'Blockchain-based solutions for secure data storage'
        },
        {
            id: 4,
            name: 'Machine Learning-based Malware Detection System',
            guide: 'Evlin Vidyu Latha P',
            category: 'ML Security',
            students: 17,
            description: 'ML algorithms for malware classification'
        },
        {
            id: 5,
            name: 'Hybrid Cryptography Framework for Quantum-Safe Communication',
            guide: 'Sunilkumar J',
            category: 'Cryptography',
            students: 7,
            description: 'Post-quantum cryptography implementations'
        }
    ];

    const MENTORS = ['Sheba Pari N', 'Dr. Ishita Chakraborty', 'Dr. Saliha Bathool', 'Evlin Vidyu Latha P', 'Sunilkumar J'];

    let currentUser = null;
    let currentProject = null;
    let projects = [];
    let projectMentors = {};
    let projectStudents = {};
    let projectTasks = {};
    let projectSubmissions = {};

    // ═══════════════════════════════════════════════════════════════════
    // AUTHENTICATION
    // ═══════════════════════════════════════════════════════════════════

    function handleLogin() {
        const username = document.getElementById('loginUsername').value.trim().toLowerCase();
        const password = document.getElementById('loginPassword').value;
        const role = document.getElementById('loginRole').value;

        if (!username || !password || !role) {
            showLoginError('Please fill all fields');
            return;
        }

        const user = Object.values(DEMO_USERS).find(u => u.username === username && u.password === password && u.role === role);

        if (!user) {
            showLoginError('Invalid credentials or role mismatch');
            return;
        }

        loginUser(user);
    }

    function handleGitHubOAuth() {
        // Simulate GitHub OAuth
        const user = { username: 'github-user', role: 'student', name: 'GitHub User', projects: [1, 2] };
        loginUser(user);
    }

    function loginUser(user) {
        currentUser = user;
        sessionStorage.setItem('user', JSON.stringify(user));
        launchApp();
    }

    function logout() {
        if (confirm('Are you sure you want to logout?')) {
            currentUser = null;
            sessionStorage.removeItem('user');
            location.reload();
        }
    }

    function showLoginError(msg) {
        const el = document.getElementById('loginError');
        el.textContent = msg;
        el.style.display = 'block';
        setTimeout(() => el.style.display = 'none', 4000);
    }

    // ═══════════════════════════════════════════════════════════════════
    // APP INITIALIZATION
    // ═══════════════════════════════════════════════════════════════════

    function launchApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('app').style.display = 'flex';

        // Load data
        loadStorage();

        // Setup UI
        setupUI();
        buildNavigation();
        showDashboard();
    }

    function setupUI() {
        const avatar = currentUser.username.charAt(0).toUpperCase();
        document.getElementById('userAvatar').textContent = avatar;
        document.getElementById('userName').textContent = currentUser.name || currentUser.username;
        document.getElementById('userRole').textContent = currentUser.role.toUpperCase();
    }

    function buildNavigation() {
        const nav = document.getElementById('sidebar');
        const items = [
            { icon: 'ti-layout-dashboard', text: 'Dashboard', fn: 'showDashboard' },
            { icon: 'ti-folder', text: 'Projects', fn: 'showProjects' },
            { icon: 'ti-checklist', text: 'Tasks', fn: 'showTasks' },
            { icon: 'ti-file-upload', text: 'Submissions', fn: 'showSubmissions' }
        ];

        nav.innerHTML = items.map(item => `
            <button class="nav-item" onclick="${item.fn}()">
                <i class="ti ${item.icon}"></i>
                <span>${item.text}</span>
            </button>
        `).join('');
    }

    // ═══════════════════════════════════════════════════════════════════
    // PAGE RENDERING
    // ═══════════════════════════════════════════════════════════════════

    function showPage(content) {
        document.getElementById('mainContent').innerHTML = content;
    }

    function showDashboard() {
        updateNav('showDashboard');
        const accessibleProjects = getAccessibleProjects();
        
        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Dashboard</h1>
                    <p class="page-sub">Welcome, ${currentUser.name || currentUser.username}</p>
                </div>
            </div>

            <div class="projects-grid">
                <div class="card">
                    <div class="card-title"><i class="ti ti-folder"></i>Accessible Projects</div>
                    <div style="font-size: 32px; font-weight: 700; color: var(--accent); margin: 10px 0;">${accessibleProjects.length}</div>
                    <div style="font-size: 13px; color: var(--text2);">Based on your role</div>
                </div>
                <div class="card">
                    <div class="card-title"><i class="ti ti-checklist"></i>Total Tasks</div>
                    <div style="font-size: 32px; font-weight: 700; color: var(--blue); margin: 10px 0;">${Object.values(projectTasks).reduce((sum, t) => sum + (t?.length || 0), 0)}</div>
                    <div style="font-size: 13px; color: var(--text2);">Across projects</div>
                </div>
                <div class="card">
                    <div class="card-title"><i class="ti ti-file-upload"></i>Submissions</div>
                    <div style="font-size: 32px; font-weight: 700; color: var(--amber); margin: 10px 0;">${Object.values(projectSubmissions).reduce((sum, s) => sum + (s?.length || 0), 0)}</div>
                    <div style="font-size: 13px; color: var(--text2);">Total submissions</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="ti ti-folder"></i>Your Projects</div>
                ${accessibleProjects.length > 0 
                    ? accessibleProjects.map(p => `
                        <div style="padding: 12px 0; border-bottom: 1px solid var(--border); cursor: pointer;" onclick="viewProjectDetail(${p.id})">
                            <div style="font-weight: 500; margin-bottom: 4px;">${p.name.slice(0, 60)}...</div>
                            <div style="font-size: 12px; color: var(--text2);">Guide: ${p.guide}</div>
                        </div>
                    `).join('')
                    : '<div style="color: var(--text3); padding: 12px;">No accessible projects for your role</div>'}
            </div>
        `;

        showPage(html);
    }

    function showProjects() {
        updateNav('showProjects');
        const accessibleProjects = getAccessibleProjects();

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Projects</h1>
                    <p class="page-sub">${accessibleProjects.length} accessible projects</p>
                </div>
            </div>

            <div class="projects-grid">
                ${accessibleProjects.map(p => `
                    <div class="project-card" onclick="viewProjectDetail(${p.id})">
                        <div class="project-name">${p.name}</div>
                        <div class="project-info">
                            <strong>Guide:</strong> ${p.guide}<br>
                            <strong>Category:</strong> ${p.category}<br>
                            <strong>Students:</strong> ${p.students}
                        </div>
                        <div class="project-stats">
                            <div class="stat-item">
                                <div class="stat-value">${(projectMentors[p.id] || []).length}</div>
                                <div class="stat-label">Mentors</div>
                            </div>
                            <div class="stat-item">
                                <div class="stat-value">${(projectTasks[p.id] || []).length}</div>
                                <div class="stat-label">Tasks</div>
                            </div>
                        </div>
                        <div class="project-actions">
                            <button class="btn btn-primary btn-sm" onclick="viewProjectDetail(${p.id})">View Details</button>
                        </div>
                    </div>
                `).join('')}
            </div>
        `;

        showPage(html);
    }

    function viewProjectDetail(projectId) {
        if (!canAccessProject(projectId)) {
            showToast('You do not have access to this project', 'error');
            return;
        }

        currentProject = projects.find(p => p.id === projectId);
        const tasks = projectTasks[projectId] || [];
        const mentors = projectMentors[projectId] || [];
        const students = projectStudents[projectId] || [];
        const submissions = projectSubmissions[projectId] || [];

        const html = `
            <div class="detail-container active">
                <div class="detail-header">
                    <div>
                        <button class="btn btn-secondary btn-sm" onclick="showProjects()" style="margin-bottom: 8px;"><i class="ti ti-arrow-left"></i> Back</button>
                        <h1 class="detail-title">${currentProject.name}</h1>
                        <p class="detail-guide">Guide: ${currentProject.guide}</p>
                    </div>
                </div>

                <!-- Mentors Section -->
                <div class="detail-section">
                    <div class="section-title">
                        Mentors (${mentors.length})
                        ${canManageProject(currentProject.id) ? `<button class="btn-add" onclick="openAddMentorModal(${currentProject.id})"><i class="ti ti-plus"></i> Add Mentor</button>` : ''}
                    </div>
                    <div class="tags-list">
                        ${mentors.length > 0 
                            ? mentors.map(m => `
                                <div class="tag">
                                    ${m}
                                    ${canManageProject(currentProject.id) ? `<span class="tag-remove" onclick="removeMentor(${currentProject.id}, '${m}')">×</span>` : ''}
                                </div>
                            `).join('')
                            : '<div class="empty-state"><div style="font-size: 12px;">No mentors assigned</div></div>'}
                    </div>
                </div>

                <!-- Students Section -->
                <div class="detail-section">
                    <div class="section-title">
                        Students (${students.length})
                        ${canManageProject(currentProject.id) ? `<button class="btn-add" onclick="openAddStudentModal()"><i class="ti ti-plus"></i> Add Student</button>` : ''}
                    </div>
                    <div class="tags-list">
                        ${students.length > 0 
                            ? students.map((s, i) => `
                                <div class="tag">
                                    ${s}
                                    ${canManageProject(currentProject.id) ? `<span class="tag-remove" onclick="removeStudent(${currentProject.id}, ${i})">×</span>` : ''}
                                </div>
                            `).join('')
                            : '<div class="empty-state"><div style="font-size: 12px;">No students assigned</div></div>'}
                    </div>
                </div>

                <!-- Tasks Section -->
                <div class="detail-section">
                    <div class="section-title">
                        Tasks (${tasks.length})
                        ${canManageProject(currentProject.id) ? `<button class="btn-add" onclick="openAddTaskModal()"><i class="ti ti-plus"></i> Create Task</button>` : ''}
                    </div>
                    ${tasks.length > 0
                        ? tasks.map((t, i) => `
                            <div class="task-item">
                                <div class="task-content">
                                    <div class="task-title">${t.title}</div>
                                    <div class="task-dates">📅 ${t.startDate} → ${t.endDate}</div>
                                    ${t.description ? `<div class="task-desc">${t.description}</div>` : ''}
                                </div>
                                ${canManageProject(currentProject.id) ? `<button class="btn btn-sm btn-danger" onclick="removeTask(${currentProject.id}, ${i})">Delete</button>` : ''}
                            </div>
                        `).join('')
                        : '<div class="empty-state"><div style="font-size: 12px;">No tasks created</div></div>'}
                </div>

                <!-- Submissions Section -->
                <div class="detail-section">
                    <div class="section-title">
                        Submissions (${submissions.length})
                        ${canManageProject(currentProject.id) ? `<button class="btn-add" onclick="openAddSubmissionModal()"><i class="ti ti-plus"></i> Record Submission</button>` : ''}
                    </div>
                    ${submissions.length > 0
                        ? submissions.map((s, i) => `
                            <div class="submission-item">
                                <div class="submission-header">
                                    <div>
                                        <div class="submission-student">${s.student}</div>
                                        <div class="submission-task">Task: ${s.taskTitle || 'General'}</div>
                                    </div>
                                    <span class="submission-status status-${s.status.toLowerCase()}">${s.status}</span>
                                </div>
                                <a href="${s.link}" target="_blank" class="submission-link">🔗 Open Submission</a>
                                ${s.notes ? `<div style="font-size: 12px; color: var(--text2); margin-top: 8px;">Notes: ${s.notes}</div>` : ''}
                                ${canManageProject(currentProject.id) ? `<button class="btn btn-sm btn-danger" onclick="removeSubmission(${currentProject.id}, ${i})" style="margin-top: 10px;">Delete</button>` : ''}
                            </div>
                        `).join('')
                        : '<div class="empty-state"><div style="font-size: 12px;">No submissions recorded</div></div>'}
                </div>
            </div>
        `;

        showPage(html);
    }

    function showTasks() {
        updateNav('showTasks');
        const accessibleProjects = getAccessibleProjects();
        let allTasks = [];

        accessibleProjects.forEach(p => {
            (projectTasks[p.id] || []).forEach((t, i) => {
                allTasks.push({ ...t, projectId: p.id, taskIndex: i, projectName: p.name });
            });
        });

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Tasks</h1>
                    <p class="page-sub">${allTasks.length} total tasks</p>
                </div>
            </div>

            ${allTasks.length > 0
                ? allTasks.map(t => `
                    <div class="card">
                        <div style="display: flex; justify-content: space-between; align-items: start;">
                            <div>
                                <div style="font-weight: 600; font-size: 14px; margin-bottom: 4px;">${t.title}</div>
                                <div style="font-size: 12px; color: var(--text2); margin-bottom: 8px;">Project: ${t.projectName.slice(0, 50)}...</div>
                                <div style="font-size: 11px; color: var(--text3);">📅 ${t.startDate} → ${t.endDate}</div>
                                ${t.description ? `<div style="font-size: 12px; color: var(--text2); margin-top: 6px;">${t.description}</div>` : ''}
                            </div>
                        </div>
                    </div>
                `).join('')
                : '<div class="empty-state"><div class="empty-icon">📭</div>No tasks assigned</div>'}
        `;

        showPage(html);
    }

    function showSubmissions() {
        updateNav('showSubmissions');
        const accessibleProjects = getAccessibleProjects();
        let allSubmissions = [];

        accessibleProjects.forEach(p => {
            (projectSubmissions[p.id] || []).forEach((s, i) => {
                allSubmissions.push({ ...s, projectId: p.id, submissionIndex: i, projectName: p.name });
            });
        });

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Submissions</h1>
                    <p class="page-sub">${allSubmissions.length} total submissions</p>
                </div>
                ${canManageAnyProject() ? `<button class="btn btn-primary" onclick="openAddSubmissionModal()"><i class="ti ti-plus"></i> Record Submission</button>` : ''}
            </div>

            ${allSubmissions.length > 0
                ? allSubmissions.map(s => `
                    <div class="card">
                        <div class="submission-header">
                            <div>
                                <div class="submission-student">${s.student}</div>
                                <div class="submission-task">Task: ${s.taskTitle || 'General'} | Project: ${s.projectName.slice(0, 40)}...</div>
                            </div>
                            <span class="submission-status status-${s.status.toLowerCase()}">${s.status}</span>
                        </div>
                        <a href="${s.link}" target="_blank" class="submission-link">🔗 Open Submission</a>
                        ${s.notes ? `<div style="font-size: 12px; color: var(--text2); margin-top: 8px;">Notes: ${s.notes}</div>` : ''}
                    </div>
                `).join('')
                : '<div class="empty-state"><div class="empty-icon">📭</div>No submissions yet</div>'}
        `;

        showPage(html);
    }

    // ═══════════════════════════════════════════════════════════════════
    // ACCESS CONTROL
    // ═══════════════════════════════════════════════════════════════════

    function getAccessibleProjects() {
        if (currentUser.role === 'admin') {
            return projects;
        }
        return projects.filter(p => currentUser.projects && currentUser.projects.includes(p.id));
    }

    function canAccessProject(projectId) {
        if (currentUser.role === 'admin') return true;
        return currentUser.projects && currentUser.projects.includes(projectId);
    }

    function canManageProject(projectId) {
        if (currentUser.role === 'admin') return true;
        if (currentUser.role === 'mentor') {
            const project = projects.find(p => p.id === projectId);
            return project && currentUser.projects && currentUser.projects.includes(projectId);
        }
        return false;
    }

    function canManageAnyProject() {
        return currentUser.role === 'admin' || currentUser.role === 'mentor';
    }

    // ═══════════════════════════════════════════════════════════════════
    // MODAL FUNCTIONS
    // ═══════════════════════════════════════════════════════════════════

    function openModal(modalId) {
        document.getElementById('modalOverlay').classList.add('open');
        document.getElementById(modalId).style.display = 'block';
    }

    function closeModal(modalId) {
        document.getElementById('modalOverlay').classList.remove('open');
        document.getElementById(modalId).style.display = 'none';
    }

    function openAddMentorModal(projectId = null) {
        if (projectId) currentProject = projects.find(p => p.id === projectId);
        
        const mentorSelectList = document.getElementById('mentorSelectList');
        mentorSelectList.innerHTML = MENTORS.map(m => `
            <label>
                <input type="checkbox" value="${m}" ${(projectMentors[currentProject.id] || []).includes(m) ? 'checked' : ''}>
                ${m}
            </label>
        `).join('');
        
        openModal('addMentorModal');
    }

    function openAddStudentModal() {
        const studentSelectList = document.getElementById('studentSelectList');
        const allStudents = Object.values(DEMO_USERS).filter(u => u.role === 'student').map(u => u.name);
        
        studentSelectList.innerHTML = allStudents.map(s => `
            <label>
                <input type="checkbox" value="${s}" ${(projectStudents[currentProject.id] || []).includes(s) ? 'checked' : ''}>
                ${s}
            </label>
        `).join('');
        
        openModal('addStudentModal');
    }

    function openAddTaskModal() {
        document.getElementById('taskTitle').value = '';
        document.getElementById('taskDescription').value = '';
        document.getElementById('taskStartDate').value = '';
        document.getElementById('taskEndDate').value = '';
        
        const taskStudentSelectList = document.getElementById('taskStudentSelectList');
        const students = projectStudents[currentProject.id] || [];
        taskStudentSelectList.innerHTML = students.map(s => `
            <label>
                <input type="checkbox" value="${s}">
                ${s}
            </label>
        `).join('');
        
        openModal('addTaskModal');
    }

    function openAddSubmissionModal() {
        document.getElementById('submissionStudent').value = '';
        document.getElementById('submissionTask').value = '';
        document.getElementById('submissionLink').value = '';
        document.getElementById('submissionNotes').value = '';
        document.getElementById('submissionStatus').value = 'Pending';
        
        openModal('addSubmissionModal');
    }

    function saveMentors(event) {
        event.preventDefault();
        const selected = Array.from(document.querySelectorAll('#mentorSelectList input[type="checkbox"]:checked'))
            .map(cb => cb.value);
        
        if (selected.length === 0) {
            showToast('Select at least one mentor', 'error');
            return;
        }
        
        projectMentors[currentProject.id] = selected;
        saveStorage();
        closeModal('addMentorModal');
        viewProjectDetail(currentProject.id);
        showToast('Mentors updated successfully', 'success');
    }

    function saveStudents(event) {
        event.preventDefault();
        const selected = Array.from(document.querySelectorAll('#studentSelectList input[type="checkbox"]:checked'))
            .map(cb => cb.value);
        
        projectStudents[currentProject.id] = selected;
        saveStorage();
        closeModal('addStudentModal');
        viewProjectDetail(currentProject.id);
        showToast('Students updated successfully', 'success');
    }

    function saveTask(event) {
        event.preventDefault();
        const title = document.getElementById('taskTitle').value.trim();
        const description = document.getElementById('taskDescription').value.trim();
        const startDate = document.getElementById('taskStartDate').value;
        const endDate = document.getElementById('taskEndDate').value;
        
        if (!title || !startDate || !endDate) {
            showToast('Fill all required fields', 'error');
            return;
        }
        
        if (!projectTasks[currentProject.id]) projectTasks[currentProject.id] = [];
        projectTasks[currentProject.id].push({ title, description, startDate, endDate });
        
        saveStorage();
        closeModal('addTaskModal');
        viewProjectDetail(currentProject.id);
        showTasks();
        showToast('Task created successfully', 'success');
    }

    function saveSubmission(event) {
        event.preventDefault();
        const student = document.getElementById('submissionStudent').value.trim();
        const taskTitle = document.getElementById('submissionTask').value.trim();
        const link = document.getElementById('submissionLink').value.trim();
        const notes = document.getElementById('submissionNotes').value.trim();
        const status = document.getElementById('submissionStatus').value;
        
        if (!student || !link) {
            showToast('Student name and submission link are required', 'error');
            return;
        }
        
        if (!projectSubmissions[currentProject.id]) projectSubmissions[currentProject.id] = [];
        projectSubmissions[currentProject.id].push({ student, taskTitle, link, notes, status });
        
        saveStorage();
        closeModal('addSubmissionModal');
        viewProjectDetail(currentProject.id);
        showSubmissions();
        showToast('Submission recorded successfully', 'success');
    }

    function removeMentor(projectId, mentor) {
        if (confirm(`Remove ${mentor} as mentor?`)) {
            projectMentors[projectId] = projectMentors[projectId].filter(m => m !== mentor);
            saveStorage();
            viewProjectDetail(projectId);
            showToast('Mentor removed', 'success');
        }
    }

    function removeStudent(projectId, index) {
        if (confirm('Remove this student?')) {
            projectStudents[projectId].splice(index, 1);
            saveStorage();
            viewProjectDetail(projectId);
            showToast('Student removed', 'success');
        }
    }

    function removeTask(projectId, index) {
        if (confirm('Delete this task?')) {
            projectTasks[projectId].splice(index, 1);
            saveStorage();
            viewProjectDetail(projectId);
            showTasks();
            showToast('Task deleted', 'success');
        }
    }

    function removeSubmission(projectId, index) {
        if (confirm('Remove this submission?')) {
            projectSubmissions[projectId].splice(index, 1);
            saveStorage();
            viewProjectDetail(projectId);
            showSubmissions();
            showToast('Submission removed', 'success');
        }
    }

    // ═══════════════════════════════════════════════════════════════════
    // STORAGE & UTILITIES
    // ═══════════════════════════════════════════════════════════════════

    function loadStorage() {
        projects = JSON.parse(JSON.stringify(PROJECTS_DATA));
        
        const stored = localStorage.getItem('projectData');
        if (stored) {
            const data = JSON.parse(stored);
            projectMentors = data.mentors || {};
            projectStudents = data.students || {};
            projectTasks = data.tasks || {};
            projectSubmissions = data.submissions || {};
        }
    }

    function saveStorage() {
        const data = {
            mentors: projectMentors,
            students: projectStudents,
            tasks: projectTasks,
            submissions: projectSubmissions
        };
        localStorage.setItem('projectData', JSON.stringify(data));
    }

    function updateNav(fn) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`[onclick="${fn}()"]`)?.classList.add('active');
    }

    function showToast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show`;
        if (type === 'error') el.style.borderColor = 'rgba(255,87,87,0.3)';
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    // ═══════════════════════════════════════════════════════════════════
    // INITIALIZATION
    // ═══════════════════════════════════════════════════════════════════

    window.addEventListener('load', () => {
        const stored = sessionStorage.getItem('user');
        if (stored) {
            currentUser = JSON.parse(stored);
            launchApp();
        }
    });

    document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modalOverlay')) {
            closeModal('addMentorModal');
            closeModal('addStudentModal');
            closeModal('addTaskModal');
            closeModal('addSubmissionModal');
        }
    });
</script>

</body>
</html>

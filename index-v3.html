<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>InternTrack Pro v3 — GitHub OAuth Internship Management</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
<style>
:root {
  --bg: #0d0f12;
  --bg2: #141720;
  --bg3: #1a1e28;
  --surface: #1f2433;
  --surface2: #252b3b;
  --border: rgba(255,255,255,0.07);
  --border2: rgba(255,255,255,0.12);
  --text: #e8eaf0;
  --text2: #8b92a5;
  --text3: #555e72;
  --accent: #2de8b0;
  --accent2: #1bba8a;
  --accent-bg: rgba(45,232,176,0.12);
  --blue: #4a9eff;
  --amber: #f5a623;
  --red: #ff5757;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  font-family: 'Sora', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 14px;
  -webkit-font-smoothing: antialiased;
}

::-webkit-scrollbar { width: 4px; }
::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

/* Login Screen */
.login-screen {
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  position: relative;
  overflow: hidden;
}

.login-container {
  position: relative;
  z-index: 10;
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 40px;
  width: 90%;
  max-width: 480px;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.login-logo {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 8px;
}

.logo-icon {
  width: 40px;
  height: 40px;
  background: var(--accent-bg);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  color: var(--accent);
  font-size: 20px;
  border: 1px solid rgba(45,232,176,0.2);
}

.logo-text {
  font-size: 22px;
  font-weight: 700;
}

.accent { color: var(--accent); }

.login-tagline {
  font-size: 13px;
  color: var(--text2);
  margin: 20px 0;
}

.btn-github {
  width: 100%;
  padding: 12px;
  background: var(--text);
  color: var(--bg);
  border: none;
  border-radius: 6px;
  font-size: 14px;
  font-weight: 600;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 8px;
  transition: all 0.2s;
  font-family: inherit;
}

.btn-github:hover {
  background: #fff;
  transform: translateY(-1px);
}

.login-note {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--text3);
  margin-top: 12px;
  justify-content: center;
}

/* App Layout */
.app {
  display: flex;
  flex-direction: column;
  height: 100vh;
}

.hdr {
  height: 62px;
  background: var(--bg2);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 20px;
  gap: 16px;
  flex-shrink: 0;
  z-index: 50;
}

.logo {
  font-size: 18px;
  font-weight: 700;
  display: flex;
  align-items: center;
  gap: 8px;
}

.hdr-right {
  margin-left: auto;
  display: flex;
  align-items: center;
  gap: 10px;
}

.user-chip {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 4px 12px;
  cursor: pointer;
  font-size: 13px;
}

.user-chip img {
  width: 28px;
  height: 28px;
  border-radius: 50%;
}

.icon-btn {
  width: 36px;
  height: 36px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 17px;
  transition: all 0.2s;
  font-family: inherit;
}

.icon-btn:hover {
  background: var(--surface2);
  color: var(--text);
}

.layout {
  display: flex;
  flex: 1;
  overflow: hidden;
}

.sidebar {
  width: 240px;
  background: var(--bg2);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  flex-shrink: 0;
  overflow-y: auto;
  padding: 12px 0;
}

.nav-item {
  display: flex;
  align-items: center;
  gap: 10px;
  padding: 9px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 13px;
  color: var(--text2);
  transition: all 0.15s;
  margin: 0 6px 2px;
  user-select: none;
  border: none;
  background: none;
  width: auto;
  font-family: inherit;
  text-align: left;
}

.nav-item:hover {
  background: var(--bg3);
  color: var(--text);
}

.nav-item.active {
  background: var(--accent-bg);
  color: var(--accent);
  font-weight: 600;
}

.nav-item i { font-size: 17px; flex-shrink: 0; }

.main-content {
  flex: 1;
  overflow-y: auto;
  padding: 24px;
  background: var(--bg);
}

.page { display: none; }
.page.active { display: block; }

.page-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  margin-bottom: 24px;
}

.page-title {
  font-size: 24px;
  font-weight: 700;
  margin-bottom: 4px;
}

.page-sub {
  font-size: 13px;
  color: var(--text2);
}

/* Cards & Tables */
.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  margin-bottom: 16px;
}

.card-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
}

.table-hdr {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto auto auto;
  gap: 12px;
  padding: 11px 16px;
  background: var(--bg3);
  font-size: 10px;
  font-weight: 600;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.8px;
  border-bottom: 1px solid var(--border);
}

.table-row {
  display: grid;
  grid-template-columns: auto 1fr auto auto auto auto auto;
  gap: 12px;
  padding: 12px 16px;
  border-bottom: 1px solid var(--border);
  align-items: center;
  font-size: 13px;
  transition: background 0.15s;
}

.table-row:hover { background: var(--bg3); }

.badge {
  display: inline-flex;
  align-items: center;
  gap: 4px;
  font-size: 11px;
  font-weight: 600;
  padding: 3px 9px;
  border-radius: 20px;
  background: rgba(45,232,176,0.1);
  color: var(--accent);
}

.btn {
  padding: 8px 14px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 500;
  font-family: inherit;
  cursor: pointer;
  border: 1px solid var(--border2);
  background: var(--surface2);
  color: var(--text);
  transition: all 0.15s;
}

.btn:hover { background: var(--bg3); }

.btn-primary {
  background: var(--accent);
  color: var(--bg);
  border-color: var(--accent);
}

.btn-primary:hover { background: var(--accent2); }

.btn-sm { padding: 5px 10px; font-size: 12px; }

/* Modal */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.5);
  z-index: 200;
  align-items: center;
  justify-content: center;
  backdrop-filter: blur(3px);
}

.modal-overlay.open { display: flex; }

.modal {
  background: var(--surface);
  border: 1px solid var(--border2);
  border-radius: 14px;
  padding: 0;
  width: 520px;
  max-height: 85vh;
  overflow-y: auto;
  box-shadow: 0 20px 60px rgba(0,0,0,0.4);
}

.modal-hdr {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 20px;
  border-bottom: 1px solid var(--border);
  font-size: 16px;
  font-weight: 600;
}

.modal-close {
  width: 28px;
  height: 28px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  color: var(--text2);
  font-size: 16px;
  transition: all 0.2s;
  font-family: inherit;
}

.modal-close:hover {
  background: rgba(255,87,87,0.1);
  color: var(--red);
}

.modal-body { padding: 20px; }

.form-group {
  margin-bottom: 16px;
}

.form-label {
  display: block;
  font-size: 12px;
  font-weight: 600;
  color: var(--text2);
  margin-bottom: 6px;
  text-transform: uppercase;
  letter-spacing: 0.5px;
}

.form-input, textarea, select {
  width: 100%;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-size: 14px;
  font-family: inherit;
  padding: 10px 12px;
  outline: none;
  transition: border-color 0.2s;
}

.form-input:focus, textarea:focus, select:focus {
  border-color: rgba(45,232,176,0.4);
}

.form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

.toast {
  position: fixed;
  bottom: 24px;
  right: 24px;
  background: var(--surface2);
  border: 1px solid var(--border2);
  color: var(--text);
  padding: 11px 16px;
  border-radius: 6px;
  font-size: 13px;
  z-index: 999;
  opacity: 0;
  transform: translateY(12px);
  transition: all 0.25s;
  pointer-events: none;
}

.toast.show {
  opacity: 1;
  transform: translateY(0);
}

.proj-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 10px;
  padding: 18px 20px;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}

.proj-card:hover {
  border-color: var(--border2);
  background: var(--surface2);
  transform: translateY(-2px);
}

.proj-title {
  font-weight: 600;
  font-size: 14px;
  margin-bottom: 6px;
}

.proj-guide {
  font-size: 12px;
  color: var(--text2);
  margin-bottom: 8px;
}

.proj-stats {
  display: flex;
  align-items: center;
  gap: 12px;
  font-size: 12px;
  color: var(--text3);
  margin-bottom: 10px;
}

.proj-footer {
  display: flex;
  gap: 6px;
}

.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

.filter-bar {
  display: flex;
  gap: 10px;
  flex-wrap: wrap;
  margin-bottom: 16px;
  align-items: center;
}

.search-box {
  display: flex;
  align-items: center;
  gap: 8px;
  background: var(--bg3);
  border: 1px solid var(--border);
  border-radius: 6px;
  padding: 7px 12px;
  flex: 1;
  min-width: 200px;
}

.search-box i {
  color: var(--text3);
  font-size: 16px;
  flex-shrink: 0;
}

.search-box input {
  background: transparent;
  border: none;
  outline: none;
  color: var(--text);
  font-size: 13px;
  font-family: inherit;
  width: 100%;
}

.project-detail-view {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px;
  margin-bottom: 20px;
}

.detail-section {
  background: var(--bg3);
  border-radius: 10px;
  padding: 16px;
  border: 1px solid var(--border);
}

.detail-label {
  font-size: 11px;
  color: var(--text3);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 6px;
  font-weight: 600;
}

.detail-value {
  font-size: 14px;
  color: var(--text);
  margin-bottom: 12px;
}

.detail-value:last-child { margin-bottom: 0; }

.timeline {
  background: var(--bg3);
  border-radius: 10px;
  padding: 16px;
  border: 1px solid var(--border);
}

.timeline-item {
  padding: 12px 0;
  border-bottom: 1px solid var(--border);
  font-size: 13px;
}

.timeline-item:last-child {
  border-bottom: none;
}

.timeline-title {
  font-weight: 600;
  margin-bottom: 4px;
}

.timeline-date {
  font-size: 11px;
  color: var(--text3);
}

@media (max-width: 1200px) {
  .grid-2 { grid-template-columns: 1fr; }
  .project-detail-view { grid-template-columns: 1fr; }
}

@media (max-width: 768px) {
  .sidebar { display: none; }
  .modal { width: 90%; }
}
</style>
</head>
<body>

<!-- ════════════════════════════════════════════════════════════════════
     LOGIN SCREEN — GitHub OAuth Only
════════════════════════════════════════════════════════════════════════ -->
<div id="login-screen" class="login-screen">
  <div style="position:absolute;inset:0;background:radial-gradient(ellipse 80% 70% at 50% 50%,rgba(45,232,176,0.08) 0%,transparent 70%);pointer-events:none"></div>
  <div class="login-container">
    <div class="login-logo">
      <span class="logo-icon"><i class="ti ti-building-community"></i></span>
      <span class="logo-text">Intern<span class="accent">Track</span> Pro v3</span>
    </div>
    <div class="login-tagline">Cybersecurity Internship Management System</div>
    <div style="height:1px;background:var(--border);margin:16px 0"></div>
    <div style="font-size:13px;color:var(--text2);margin-bottom:20px;line-height:1.6">
      Sign in with your GitHub account to access the internship management portal.
    </div>
    <button class="btn-github" id="gh-login-btn" onclick="initiateGitHubLogin()">
      <i class="ti ti-brand-github"></i> Sign in with GitHub
    </button>
    <div class="login-note">
      <i class="ti ti-shield-check"></i>
      OAuth 2.0 secured · No passwords stored · Read-only GitHub access
    </div>
    <div id="login-error" style="display:none;padding:12px;background:rgba(255,87,87,0.1);border:1px solid rgba(255,87,87,0.2);border-radius:6px;color:var(--red);font-size:12px;margin-top:12px"></div>
  </div>
</div>

<!-- ════════════════════════════════════════════════════════════════════
     MAIN APP
════════════════════════════════════════════════════════════════════════ -->
<div id="app" class="app" style="display:none">
  <header class="hdr">
    <div class="logo">
      <i class="ti ti-building-community"></i>
      Intern<span class="accent">Track</span>
    </div>
    <div style="margin-left:auto;display:flex;align-items:center;gap:10px">
      <button class="icon-btn" onclick="logout()"><i class="ti ti-logout"></i></button>
      <div class="user-chip">
        <img id="user-avatar" src="" alt="avatar" width="28" height="28">
        <span id="user-login">User</span>
      </div>
    </div>
  </header>

  <div class="layout">
    <nav class="sidebar" id="sidebar"></nav>
    <main class="main-content" id="main-content"></main>
  </div>
</div>

<!-- Modal Overlay -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModalOnOverlay(event)">
  <!-- Add Mentor Modal -->
  <div class="modal" id="add-mentor-modal" style="display:none">
    <div class="modal-hdr">
      Add Mentor to Project
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Select Mentor</label>
        <select id="mentor-select" class="form-input"></select>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addMentor()">Add Mentor</button>
      </div>
    </div>
  </div>

  <!-- Add Student Modal -->
  <div class="modal" id="add-student-modal" style="display:none">
    <div class="modal-hdr">
      Add Student to Project
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Select Student</label>
        <select id="student-select" class="form-input"></select>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="addStudent()">Add Student</button>
      </div>
    </div>
  </div>

  <!-- Add Task Modal -->
  <div class="modal" id="add-task-modal" style="display:none">
    <div class="modal-hdr">
      Create Task
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Task Title</label>
        <input type="text" id="task-title" class="form-input" placeholder="e.g. Complete design document">
      </div>
      <div class="form-row">
        <div class="form-group">
          <label class="form-label">Start Date</label>
          <input type="date" id="task-start" class="form-input">
        </div>
        <div class="form-group">
          <label class="form-label">End Date</label>
          <input type="date" id="task-end" class="form-input">
        </div>
      </div>
      <div class="form-group">
        <label class="form-label">Description</label>
        <textarea id="task-desc" class="form-input" rows="3" placeholder="Task description..."></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="createTask()">Create Task</button>
      </div>
    </div>
  </div>

  <!-- Submit Work Modal -->
  <div class="modal" id="submit-work-modal" style="display:none">
    <div class="modal-hdr">
      Submit Work
      <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
    </div>
    <div class="modal-body">
      <div class="form-group">
        <label class="form-label">Task</label>
        <select id="submit-task" class="form-input"></select>
      </div>
      <div class="form-group">
        <label class="form-label">Submission Type</label>
        <select id="submit-type" class="form-input">
          <option>GitHub Repository Link</option>
          <option>Google Drive Link</option>
          <option>Direct Upload</option>
        </select>
      </div>
      <div class="form-group">
        <label class="form-label">Submission Link / File</label>
        <input type="text" id="submit-link" class="form-input" placeholder="https://github.com/... or https://drive.google.com/...">
      </div>
      <div class="form-group">
        <label class="form-label">Notes</label>
        <textarea id="submit-notes" class="form-input" rows="2" placeholder="Any additional notes..."></textarea>
      </div>
      <div style="display:flex;gap:8px;justify-content:flex-end;margin-top:18px">
        <button class="btn" onclick="closeModal()">Cancel</button>
        <button class="btn btn-primary" onclick="submitWork()">Submit</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="app-v3.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InternTrack Pro - Project Management with GitHub</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@2.44.0/tabler-icons.min.css">
    <style>
        :root {
            --bg: #0d0f12;
            --bg2: #141720;
            --bg3: #1a1e28;
            --surface: #1f2433;
            --surface2: #252b3b;
            --border: rgba(255,255,255,0.07);
            --border2: rgba(255,255,255,0.12);
            --text: #e8eaf0;
            --text2: #8b92a5;
            --text3: #555e72;
            --accent: #2de8b0;
            --accent2: #1bba8a;
            --accent-bg: rgba(45,232,176,0.12);
            --blue: #4a9eff;
            --blue-bg: rgba(74,158,255,0.1);
            --amber: #f5a623;
            --red: #ff5757;
            --red-bg: rgba(255,87,87,0.1);
            --r: 10px;
            --r-sm: 6px;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        html, body { height: 100%; font-family: 'Sora', system-ui; background: var(--bg); color: var(--text); font-size: 14px; -webkit-font-smoothing: antialiased; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: var(--border2); border-radius: 2px; }

        .app {
            display: flex;
            flex-direction: column;
            height: 100vh;
        }

        .hdr {
            height: 62px;
            background: var(--bg2);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
            flex-shrink: 0;
            z-index: 50;
        }

        .logo {
            font-size: 18px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 8px;
            letter-spacing: -0.3px;
        }

        .logo i { font-size: 20px; }

        .hdr-right {
            margin-left: auto;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .gh-status {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 10px;
            background: var(--blue-bg);
            border: 1px solid rgba(74,158,255,0.2);
            border-radius: var(--r-sm);
            font-size: 11px;
            color: var(--blue);
            font-weight: 600;
        }

        .gh-status i {
            font-size: 12px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 4px 12px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            font-size: 13px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--accent-bg);
            color: var(--accent);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .icon-btn {
            width: 36px;
            height: 36px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text2);
            font-size: 17px;
            transition: all 0.2s;
            font-family: inherit;
            border-style: none;
        }

        .icon-btn:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .layout {
            display: flex;
            flex: 1;
            overflow: hidden;
        }

        .sidebar {
            width: 240px;
            background: var(--bg2);
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            flex-shrink: 0;
            overflow-y: auto;
            padding: 12px 0;
        }

        .nav-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 9px 12px;
            border-radius: var(--r-sm);
            cursor: pointer;
            font-size: 13px;
            color: var(--text2);
            transition: all 0.15s;
            margin: 0 6px 2px;
            user-select: none;
            border: none;
            background: none;
            font-family: inherit;
            text-align: left;
        }

        .nav-item:hover {
            background: var(--bg3);
            color: var(--text);
        }

        .nav-item.active {
            background: var(--accent-bg);
            color: var(--accent);
            font-weight: 600;
        }

        .nav-item i { font-size: 17px; flex-shrink: 0; }

        .main-content {
            flex: 1;
            overflow-y: auto;
            padding: 24px;
            background: var(--bg);
        }

        .page-hdr {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 24px;
        }

        .page-title {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: -0.4px;
            margin-bottom: 4px;
        }

        .page-sub {
            font-size: 13px;
            color: var(--text2);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 18px 20px;
            margin-bottom: 16px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 14px;
            display: flex;
            align-items: center;
            gap: 7px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card-title i {
            font-size: 16px;
            color: var(--accent);
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
            margin-bottom: 24px;
        }

        .project-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            padding: 18px 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .project-card:hover {
            border-color: var(--border2);
            background: var(--surface2);
            transform: translateY(-2px);
        }

        .project-name {
            font-size: 14px;
            font-weight: 600;
            color: var(--text);
            margin-bottom: 8px;
        }

        .project-guide {
            font-size: 12px;
            color: var(--text2);
            margin-bottom: 12px;
        }

        .project-repo {
            font-size: 11px;
            color: var(--blue);
            font-family: 'DM Mono', monospace;
            margin-bottom: 12px;
            word-break: break-all;
        }

        .badge {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            padding: 3px 9px;
            border-radius: 12px;
            background: var(--accent-bg);
            color: var(--accent);
            margin-bottom: 12px;
        }

        .project-actions {
            display: flex;
            gap: 8px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            padding: 8px 14px;
            border-radius: var(--r-sm);
            font-size: 12px;
            font-weight: 600;
            font-family: inherit;
            cursor: pointer;
            border: none;
            transition: all 0.2s;
            flex: 1;
        }

        .btn-primary {
            background: var(--accent);
            color: var(--bg);
        }

        .btn-primary:hover {
            background: var(--accent2);
        }

        .btn-secondary {
            background: var(--bg3);
            border: 1px solid var(--border);
            color: var(--text2);
        }

        .btn-secondary:hover {
            background: var(--surface2);
            color: var(--text);
        }

        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            z-index: 200;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(3px);
        }

        .modal-overlay.open {
            display: flex;
        }

        .modal {
            background: var(--surface);
            border: 1px solid var(--border2);
            border-radius: 14px;
            padding: 20px;
            width: 480px;
            max-height: 85vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0,0,0,0.4);
        }

        .modal-hdr {
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 18px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .modal-close {
            width: 28px;
            height: 28px;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text2);
            font-size: 16px;
            transition: all 0.2s;
            font-family: inherit;
        }

        .modal-close:hover {
            background: var(--red-bg);
            color: var(--red);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: var(--text2);
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input, textarea, select {
            width: 100%;
            background: var(--bg3);
            border: 1px solid var(--border);
            border-radius: var(--r-sm);
            color: var(--text);
            font-size: 14px;
            font-family: inherit;
            padding: 10px 12px;
            outline: none;
            transition: border-color 0.2s;
        }

        .form-input:focus, textarea:focus, select:focus {
            border-color: rgba(45,232,176,0.4);
        }

        .table-container {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--r);
            overflow: hidden;
        }

        .table-hdr {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            padding: 11px 16px;
            background: var(--bg3);
            font-size: 10px;
            font-weight: 600;
            color: var(--text3);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            border-bottom: 1px solid var(--border);
        }

        .table-row {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 12px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            align-items: center;
            font-size: 13px;
            transition: background 0.15s;
        }

        .table-row:hover {
            background: var(--bg3);
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--surface2);
            border: 1px solid var(--border2);
            color: var(--text);
            padding: 11px 16px;
            border-radius: var(--r-sm);
            font-size: 13px;
            z-index: 999;
            opacity: 0;
            transform: translateY(12px);
            transition: all 0.25s;
            pointer-events: none;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
        }

        .toast.show {
            opacity: 1;
            transform: translateY(0);
        }

        .toast.success {
            border-color: rgba(45,232,176,0.3);
            color: var(--accent);
        }

        .toast.error {
            border-color: rgba(255,87,87,0.3);
            color: var(--red);
        }

        .empty-state {
            text-align: center;
            padding: 32px;
            color: var(--text3);
        }

        @media (max-width: 768px) {
            .sidebar { display: none; }
            .modal { width: 90%; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

<div class="app">
    <header class="hdr">
        <div class="logo">
            <i class="ti ti-building-community"></i>
            Intern<span style="color:var(--accent)">Track</span> Pro
        </div>
        <div style="font-size: 11px; color: var(--text2);">RVU Cybersecurity Platform</div>

        <div class="hdr-right">
            <div class="gh-status">
                <i class="ti ti-brand-github"></i>
                <span id="ghStatusText">Configured</span>
            </div>

            <div class="user-info">
                <div class="user-avatar" id="userAvatar">U</div>
                <div style="display: flex; flex-direction: column; gap: 2px; min-width: 0;">
                    <div style="font-size: 13px; font-weight: 600;" id="userName">User</div>
                    <span style="font-size: 10px; color: var(--text3);" id="userRole">Role</span>
                </div>
            </div>

            <button class="icon-btn" onclick="logout()" title="Logout">
                <i class="ti ti-logout"></i>
            </button>
        </div>
    </header>

    <div class="layout">
        <nav class="sidebar" id="sidebar"></nav>
        <main class="main-content" id="mainContent"></main>
    </div>
</div>

<!-- Modal -->
<div id="modalOverlay" class="modal-overlay">
    <div id="projectModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            <span id="modalTitle">Add Project</span>
            <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">Project Name *</label>
                <input type="text" id="projName" class="form-input" placeholder="Project name">
            </div>
            <div class="form-group">
                <label class="form-label">Faculty Guide *</label>
                <select id="projGuide" class="form-input"></select>
            </div>
            <div class="form-group">
                <label class="form-label">GitHub Repository *</label>
                <input type="text" id="projRepo" class="form-input" placeholder="repository-name">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="projDesc" class="form-input" rows="3" placeholder="Project description..."></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Max Students</label>
                <input type="number" id="projMaxStudents" class="form-input" value="20" min="1">
            </div>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="saveProject()">Create</button>
        </div>
    </div>

    <div id="submissionModal" class="modal" style="display: none;">
        <div class="modal-hdr">
            <span>Submit Work</span>
            <button class="modal-close" onclick="closeModal()"><i class="ti ti-x"></i></button>
        </div>
        <div class="modal-body">
            <div class="form-group">
                <label class="form-label">GitHub Repository Link *</label>
                <input type="text" id="subLink" class="form-input" placeholder="https://github.com/rvu-cybersecurity/...">
            </div>
            <div class="form-group">
                <label class="form-label">Assignment/Milestone</label>
                <input type="text" id="subMilestone" class="form-input" placeholder="e.g., Week 5 Assignment">
            </div>
            <div class="form-group">
                <label class="form-label">Description</label>
                <textarea id="subDesc" class="form-input" rows="3" placeholder="What did you submit..."></textarea>
            </div>
        </div>
        <div style="display: flex; gap: 8px; justify-content: flex-end; margin-top: 18px;">
            <button class="btn btn-secondary" onclick="closeModal()">Cancel</button>
            <button class="btn btn-primary" onclick="submitWork()">Submit to GitHub</button>
        </div>
    </div>
</div>

<div class="toast" id="toast"></div>

<script>
    // ═══════════════════════════════════════════════════════════════════
    // INITIALIZE APP
    // ═══════════════════════════════════════════════════════════════════

    const PROJECTS_DATA = [
        {
            id: 1,
            name: '802.1X Port-Based Authentication with RADIUS on Wired & Wireless',
            guide: 'Dr. Manish Kumar',
            students: 3,
            maxStudents: 20,
            repo: 'rvu-proj-802-1x',
            description: 'Implementing port-based authentication using RADIUS protocol'
        },
        {
            id: 2,
            name: 'Q-Learning Based Intrusion-Resilient Routing Protocol for IoT',
            guide: 'Sunilkumar J',
            students: 3,
            maxStudents: 20,
            repo: 'rvu-proj-iot-routing',
            description: 'AI-based routing protocols for secure IoT communication'
        },
        {
            id: 3,
            name: 'AI-Based Cyber Crime Prediction System',
            guide: 'Evlin Vidyu Latha P',
            students: 20,
            maxStudents: 25,
            repo: 'rvu-proj-crime-pred',
            description: 'Machine learning for cyber crime pattern detection'
        },
        {
            id: 4,
            name: 'AI-Based Network Traffic Anomaly Detection',
            guide: 'Dr.Sarasvathi V',
            students: 17,
            maxStudents: 25,
            repo: 'rvu-proj-anomaly',
            description: 'Detecting network anomalies using AI'
        },
        {
            id: 5,
            name: 'AI-Driven Adaptive Intrusion Detection Framework',
            guide: 'Dr. Manish Kumar',
            students: 7,
            maxStudents: 20,
            repo: 'rvu-proj-ids',
            description: 'Adaptive IDS using machine learning'
        }
    ];

    const FACULTY = [
        { name: 'Dr. Manish Kumar', email: 'manish@rvu.edu', github: 'manish-rvu' },
        { name: 'Sunilkumar J', email: 'sunil@rvu.edu', github: 'sunil-rvu' },
        { name: 'Evlin Vidyu Latha P', email: 'evlin@rvu.edu', github: 'evlin-rvu' },
        { name: 'Dr.Sarasvathi V', email: 'sara@rvu.edu', github: 'sara-rvu' }
    ];

    let currentUser = null;
    let projects = JSON.parse(localStorage.getItem('projects')) || JSON.parse(JSON.stringify(PROJECTS_DATA));
    let githubConfig = JSON.parse(localStorage.getItem('githubConfig')) || {};
    let submissions = JSON.parse(localStorage.getItem('submissions')) || [];

    // ═══════════════════════════════════════════════════════════════════
    // INIT
    // ═══════════════════════════════════════════════════════════════════

    window.addEventListener('load', () => {
        const stored = localStorage.getItem('currentUser');
        
        if (!stored) {
            window.location.href = 'interntrack-login.html';
            return;
        }

        currentUser = JSON.parse(stored);

        setupUI();
        buildNavigation();
        showDashboard();
    });

    function setupUI() {
        const avatar = currentUser.name.charAt(0).toUpperCase();
        document.getElementById('userAvatar').textContent = avatar;
        document.getElementById('userName').textContent = currentUser.name;
        document.getElementById('userRole').textContent = currentUser.role.toUpperCase();

        // Populate faculty select
        document.getElementById('projGuide').innerHTML = FACULTY.map(f => 
            `<option value="${f.name}">${f.name}</option>`
        ).join('');

        // Check GitHub status
        if (githubConfig.isConfigured) {
            document.getElementById('ghStatusText').textContent = 'Configured';
            document.getElementById('ghStatusText').style.color = 'var(--accent)';
        }
    }

    function buildNavigation() {
        const nav = document.getElementById('sidebar');
        const items = [];

        items.push({ icon: 'ti-layout-dashboard', text: 'Dashboard', fn: 'showDashboard' });
        items.push({ icon: 'ti-folder', text: 'Projects', fn: 'showProjects' });
        
        if (currentUser.role === 'student') {
            items.push({ icon: 'ti-file-upload', text: 'My Submissions', fn: 'showSubmissions' });
        }

        if (currentUser.role === 'mentor') {
            items.push({ icon: 'ti-users', text: 'My Students', fn: 'showStudents' });
            items.push({ icon: 'ti-file-upload', text: 'Submissions', fn: 'showSubmissions' });
        }

        if (currentUser.role === 'admin') {
            items.push({ icon: 'ti-user-plus', text: 'Add Project', fn: 'openAddProject' });
            items.push({ icon: 'ti-users', text: 'Manage Users', fn: 'showUsers' });
            items.push({ icon: 'ti-settings', text: 'Settings', fn: 'showSettings' });
        }

        nav.innerHTML = items.map(item => `
            <button class="nav-item" onclick="${item.fn}()">
                <i class="ti ${item.icon}"></i>
                <span>${item.text}</span>
            </button>
        `).join('');
    }

    // ═══════════════════════════════════════════════════════════════════
    // PAGES
    // ═══════════════════════════════════════════════════════════════════

    function showDashboard() {
        updateNav('showDashboard');
        const accessProjects = currentUser.role === 'admin' 
            ? projects 
            : projects.filter(p => currentUser.role === 'student' || currentUser.role === 'mentor');

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Dashboard</h1>
                    <p class="page-sub">Welcome, ${currentUser.name}</p>
                </div>
            </div>

            <div class="projects-grid">
                <div class="card">
                    <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px;">Active Projects</div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--accent); margin-bottom: 4px;">${projects.length}</div>
                </div>
                <div class="card">
                    <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px;">Your Projects</div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--blue); margin-bottom: 4px;">${accessProjects.length}</div>
                </div>
                <div class="card">
                    <div style="font-size: 11px; color: var(--text3); text-transform: uppercase; margin-bottom: 8px;">Submissions</div>
                    <div style="font-size: 28px; font-weight: 700; color: var(--amber); margin-bottom: 4px;">${submissions.length}</div>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="ti ti-folder"></i>Available Projects</div>
                ${accessProjects.map(p => `
                    <div style="padding: 12px 0; border-bottom: 1px solid var(--border);">
                        <div style="font-weight: 500; margin-bottom: 3px;">${p.name.slice(0,70)}</div>
                        <div style="font-size: 12px; color: var(--text2);">Guide: ${p.guide}</div>
                    </div>
                `).join('')}
            </div>
        `;

        updateContent(html);
    }

    function showProjects() {
        updateNav('showProjects');
        const accessProjects = currentUser.role === 'admin' 
            ? projects 
            : projects.filter(p => currentUser.role === 'student' || currentUser.role === 'mentor');

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Projects</h1>
                    <p class="page-sub">${accessProjects.length} projects available</p>
                </div>
                ${currentUser.role === 'admin' ? `<button class="btn btn-primary" style="width: auto;" onclick="openAddProject()"><i class="ti ti-plus"></i> New Project</button>` : ''}
            </div>

            <div class="projects-grid">
                ${accessProjects.map(p => `
                    <div class="project-card">
                        <div class="project-name">${p.name}</div>
                        <div class="project-guide">Guide: <strong>${p.guide}</strong></div>
                        <div class="project-repo"><i class="ti ti-brand-github" style="font-size: 11px; margin-right: 3px;"></i>rvu-cybersecurity/${p.repo}</div>
                        <span class="badge">Active</span>
                        <div class="project-actions">
                            <button class="btn btn-secondary" onclick="viewProject(${p.id})">View</button>
                            ${currentUser.role === 'student' ? `<button class="btn btn-primary" onclick="openSubmission(${p.id})"><i class="ti ti-upload"></i> Submit</button>` : ''}
                        </div>
                    </div>
                `).join('')}
            </div>
        `;

        updateContent(html);
    }

    function showSubmissions() {
        updateNav('showSubmissions');

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Submissions</h1>
                    <p class="page-sub">${submissions.length} total submissions</p>
                </div>
            </div>

            <div class="table-container">
                <div class="table-hdr">
                    <div>Student</div>
                    <div>Project</div>
                    <div>Repository</div>
                    <div>Date</div>
                </div>
                ${submissions.length > 0 
                    ? submissions.map(s => `
                        <div class="table-row">
                            <div>${s.student}</div>
                            <div>${s.project}</div>
                            <div><a href="${s.repoLink}" target="_blank" style="color: var(--blue); text-decoration: none;">View on GitHub</a></div>
                            <div>${s.date}</div>
                        </div>
                    `).join('')
                    : '<div style="padding: 20px; text-align: center; color: var(--text3);">No submissions yet</div>'}
            </div>
        `;

        updateContent(html);
    }

    function showStudents() {
        updateNav('showStudents');

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">My Students</h1>
                    <p class="page-sub">Students assigned to your projects</p>
                </div>
            </div>

            <div class="card">
                <div class="empty-state">
                    <i class="ti ti-users" style="font-size: 48px; color: var(--text3); display: block; margin-bottom: 12px;"></i>
                    <p>No students assigned yet</p>
                </div>
            </div>
        `;

        updateContent(html);
    }

    function showUsers() {
        updateNav('showUsers');

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Manage Users</h1>
                    <p class="page-sub">System users and roles</p>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="ti ti-users"></i>Registered Users</div>
                <div class="empty-state">
                    <p>Users management coming soon</p>
                </div>
            </div>
        `;

        updateContent(html);
    }

    function showSettings() {
        updateNav('showSettings');

        const html = `
            <div class="page-hdr">
                <div>
                    <h1 class="page-title">Settings</h1>
                    <p class="page-sub">System configuration</p>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><i class="ti ti-brand-github"></i>GitHub Organization</div>
                <div style="padding: 12px; background: var(--bg3); border-radius: var(--r-sm); margin-bottom: 12px;">
                    <div style="font-size: 12px; color: var(--text2); margin-bottom: 4px;">Organization:</div>
                    <div style="font-size: 14px; font-weight: 600; color: var(--text);">${githubConfig.org || 'Not configured'}</div>
                </div>
                <div style="padding: 12px; background: ${githubConfig.isConfigured ? 'rgba(45,232,176,0.1)' : 'rgba(255,87,87,0.1)'}; border-radius: var(--r-sm); border: 1px solid ${githubConfig.isConfigured ? 'rgba(45,232,176,0.2)' : 'rgba(255,87,87,0.2)'}; color: ${githubConfig.isConfigured ? 'var(--accent)' : 'var(--red)'};">
                    Status: ${githubConfig.isConfigured ? '✓ Configured' : '✗ Not configured'}
                </div>
            </div>
        `;

        updateContent(html);
    }

    // ═══════════════════════════════════════════════════════════════════
    // MODALS & FUNCTIONS
    // ═══════════════════════════════════════════════════════════════════

    function openAddProject() {
        if (currentUser.role !== 'admin') {
            showToast('Admin access required', 'error');
            return;
        }
        document.getElementById('modalTitle').textContent = 'Add New Project';
        document.getElementById('projName').value = '';
        document.getElementById('projRepo').value = '';
        document.getElementById('projDesc').value = '';
        document.getElementById('projMaxStudents').value = '20';
        openModal();
    }

    function openSubmission(projectId) {
        const project = projects.find(p => p.id === projectId);
        document.getElementById('subMilestone').value = project.name.slice(0, 40);
        document.getElementById('modalOverlay').classList.add('open');
        document.getElementById('submissionModal').style.display = 'block';
    }

    function openModal() {
        document.getElementById('modalOverlay').classList.add('open');
        document.getElementById('projectModal').style.display = 'block';
    }

    function closeModal() {
        document.getElementById('modalOverlay').classList.remove('open');
        document.getElementById('projectModal').style.display = 'none';
        document.getElementById('submissionModal').style.display = 'none';
    }

    function saveProject() {
        const name = document.getElementById('projName').value.trim();
        const guide = document.getElementById('projGuide').value;
        const repo = document.getElementById('projRepo').value.trim();
        const desc = document.getElementById('projDesc').value.trim();
        const maxStudents = parseInt(document.getElementById('projMaxStudents').value) || 20;

        if (!name || !guide || !repo) {
            showToast('Fill all required fields', 'error');
            return;
        }

        const newProject = {
            id: Math.max(...projects.map(p => p.id)) + 1,
            name,
            guide,
            students: 0,
            maxStudents,
            repo,
            description: desc
        };

        projects.push(newProject);
        localStorage.setItem('projects', JSON.stringify(projects));

        showToast('Project created successfully', 'success');
        closeModal();
        showProjects();
    }

    function submitWork() {
        const repoLink = document.getElementById('subLink').value.trim();
        const milestone = document.getElementById('subMilestone').value.trim();
        const desc = document.getElementById('subDesc').value.trim();

        if (!repoLink) {
            showToast('Enter GitHub repository link', 'error');
            return;
        }

        if (!repoLink.includes('github.com/rvu-cybersecurity')) {
            showToast('Repository must be in RVU Cybersecurity organization', 'error');
            return;
        }

        const submission = {
            id: submissions.length + 1,
            student: currentUser.name,
            project: milestone || 'General',
            repoLink,
            date: new Date().toLocaleDateString(),
            description: desc
        };

        submissions.push(submission);
        localStorage.setItem('submissions', JSON.stringify(submissions));

        showToast('✓ Work submitted to GitHub successfully!', 'success');
        closeModal();
        showSubmissions();
    }

    function viewProject(id) {
        const project = projects.find(p => p.id === id);
        alert(`Project: ${project.name}\nGuide: ${project.guide}\nRepository: rvu-cybersecurity/${project.repo}`);
    }

    // ═══════════════════════════════════════════════════════════════════
    // UTILITIES
    // ═══════════════════════════════════════════════════════════════════

    function updateNav(fn) {
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        document.querySelector(`[onclick="${fn}()"]`)?.classList.add('active');
    }

    function updateContent(html) {
        document.getElementById('mainContent').innerHTML = html;
    }

    function showToast(msg, type = 'success') {
        const el = document.getElementById('toast');
        el.textContent = msg;
        el.className = `toast show ${type}`;
        setTimeout(() => el.classList.remove('show'), 3000);
    }

    function logout() {
        if (confirm('Logout?')) {
            localStorage.removeItem('currentUser');
            window.location.href = 'interntrack-login.html';
        }
    }

    document.getElementById('modalOverlay').addEventListener('click', (e) => {
        if (e.target === document.getElementById('modalOverlay')) {
            closeModal();
        }
    });
</script>

</body>
</html>
